<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>深淵進化紀錄</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05070a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#05070a;--panel:#0b121c;--panel2:#111827;--line:#2f4158;
  --text:#f4e6c8;--muted:#9aa6b5;--gold:#c89b3c;--gold2:#f0d48a;
  --red:#b8333b;--purple:#7d3cff;--blue:#2e8cff;--green:#68d391;--danger:#ff5c6c;
  --shadow:0 24px 80px rgba(0,0,0,.55);--radius:24px;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  background:
    radial-gradient(circle at 12% 8%,rgba(200,155,60,.22),transparent 26%),
    radial-gradient(circle at 82% 12%,rgba(46,140,255,.16),transparent 24%),
    radial-gradient(circle at 65% 92%,rgba(125,60,255,.18),transparent 28%),
    linear-gradient(135deg,#020308,#0b111b 48%,#05070a);
}
button,input,select{font:inherit}
button{
  border:1px solid rgba(240,212,138,.28);border-radius:14px;padding:10px 13px;
  background:linear-gradient(180deg,#1b2635,#0d141e);color:var(--text);font-weight:900;cursor:pointer;
}
button.primary{background:linear-gradient(180deg,#d4a84a,#7b571d);color:#080808;border-color:#f0d48a}
button.danger{background:linear-gradient(180deg,#b8333b,#6b1f27);border-color:#ff7a83}
button.ghost{background:rgba(255,255,255,.045)}
input,select{
  width:100%;border:1px solid rgba(240,212,138,.22);border-radius:14px;
  background:rgba(3,7,12,.62);color:var(--text);padding:11px 12px;outline:none;
}
.app{width:min(1320px,calc(100% - 24px));margin:16px auto 30px}
.card,.side,.main,.modal-card{
  border:1px solid rgba(240,212,138,.22);border-radius:var(--radius);
  background:rgba(10,16,24,.84);box-shadow:var(--shadow);padding:18px;
}
.hero{
  border:1px solid rgba(240,212,138,.28);border-radius:30px;padding:20px;
  background:linear-gradient(135deg,rgba(15,26,38,.96),rgba(7,9,13,.96));box-shadow:var(--shadow);
}
.hero-top,.topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
h1,h2,h3{margin:0 0 8px}.muted{color:var(--muted);font-size:13px;line-height:1.55}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.nav-card{border-radius:22px;border:1px solid rgba(240,212,138,.22);padding:18px;min-height:126px;cursor:pointer;position:relative;overflow:hidden}
.nav-card.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.14)}
.chogath{background:radial-gradient(circle at right bottom,rgba(184,51,59,.42),transparent 38%),linear-gradient(135deg,rgba(45,9,18,.9),rgba(16,9,22,.95))}
.nasus{background:radial-gradient(circle at right bottom,rgba(200,155,60,.42),transparent 38%),linear-gradient(135deg,rgba(28,29,32,.92),rgba(9,12,16,.96))}
.kalis{background:radial-gradient(circle at right bottom,rgba(46,140,255,.36),transparent 38%),linear-gradient(135deg,rgba(31,18,70,.92),rgba(5,14,28,.96))}
.sigil{position:absolute;right:14px;bottom:4px;font-size:56px;opacity:.16}
.content{display:grid;grid-template-columns:320px 1fr;gap:18px;margin-top:18px}
.side{height:calc(100vh - 280px);min-height:530px;position:sticky;top:14px;overflow:hidden;display:flex;flex-direction:column}
.history{overflow:auto;flex:1;padding-right:4px}.history-item{width:100%;text-align:left;margin-bottom:10px;padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text)}
.history-item.active{border-color:var(--gold);background:rgba(200,155,60,.08)}
.history-row{display:flex;justify-content:space-between;gap:8px}
.section-title{font-size:13px;letter-spacing:.8px;color:var(--gold2);font-weight:900;margin:14px 0 8px;text-transform:uppercase}
.panel{border:1px solid rgba(255,255,255,.08);border-radius:20px;background:rgba(255,255,255,.035);padding:16px;margin-bottom:16px}
.grid{display:grid;gap:10px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:1.2fr .8fr repeat(4,.7fr)}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sum{padding:15px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(240,212,138,.16)}
.sum .value{font-size:25px;font-weight:950;margin-top:4px}.progress{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:center;font-size:14px}td:first-child,th:first-child{text-align:left}th{color:var(--gold2);font-size:12px}
.empty{text-align:center;color:var(--muted);padding:24px}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:900;border:1px solid rgba(255,255,255,.12)}
.pill.gold{background:rgba(200,155,60,.18);color:#f0d48a}.pill.purple{background:rgba(125,60,255,.18);color:#c2a8ff}.pill.blue{background:rgba(46,140,255,.18);color:#9cc9ff}.pill.green{background:rgba(104,211,145,.15);color:#a7f3c3}.pill.red{background:rgba(184,51,59,.18);color:#ff9aa2}
.exercise{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;margin-bottom:12px;background:rgba(255,255,255,.035)}
.setrow{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:8px}
.alert{border:1px solid rgba(255,92,108,.4);background:rgba(255,92,108,.09);border-radius:18px;padding:14px;margin-bottom:16px}.ok{border-color:rgba(104,211,145,.35);background:rgba(104,211,145,.08)}
.chart{height:230px;border-radius:18px;background:linear-gradient(180deg,rgba(46,140,255,.08),rgba(125,60,255,.05));border:1px solid rgba(255,255,255,.08);padding:12px}
svg{width:100%;height:100%}
.musicbox{margin-top:12px;border-radius:18px;overflow:hidden;border:1px solid rgba(240,212,138,.16);background:#000}
.musicbox iframe{width:100%;height:160px;border:0}
.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(540px,100%)}
.toast-stage{position:fixed;inset:0;display:none;place-items:center;z-index:80;background:rgba(0,0,0,.55)}
.toast-stage.show{display:grid}.toast{min-width:min(520px,92vw);text-align:center;border:1px solid var(--gold);border-radius:28px;padding:34px 24px;background:linear-gradient(135deg,rgba(8,12,18,.96),rgba(20,15,8,.96));box-shadow:0 0 70px rgba(200,155,60,.36);animation:slam 1.7s ease forwards}
.toast-title{font-size:42px;font-weight:1000;color:var(--gold2)}@keyframes slam{0%{transform:scale(.75);opacity:0}20%{transform:scale(1.06);opacity:1}85%{opacity:1}100%{transform:scale(.96);opacity:0}}
.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.64);padding:20px;overflow:auto}.modal.show{display:grid;place-items:start center}.modal-card{width:min(940px,100%);background:#0c121b;margin-top:24px}
@media(max-width:950px){.content{grid-template-columns:1fr}.side{position:static;height:auto;min-height:0;max-height:350px}.nav,.summary,.g4,.g6{grid-template-columns:1fr}.hero-top,.topbar{flex-direction:column}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-stage" id="toastStage"><div class="toast"><div class="toast-title" id="toastTitle">VICTORY</div><div id="toastSub">今日訓練完成</div></div></div>
<div class="modal" id="settingsModal"><div class="modal-card"><div class="topbar"><div><h2>設定科加斯飲食方針</h2><div class="muted">可設定減脂/增肌模式與每個日型的目標。</div></div><button onclick="closeSettings()">關閉</button></div><div id="settingsContent"></div><button class="primary" onclick="saveSettings()">儲存設定</button></div></div>
<script>
const STORE="abyss_fixed_v3";
const today=()=>new Date().toISOString().slice(0,10);
const yt={
 food:["g9R5F1Y2LzA","yOp9tieILXQ","C94SsKVPUGs","RmS8UBXnN9k"],
 training:["C1bVpeax98A","7s9fCFTdjsw","1Ni1SFVl7RM","rJ7rPKVEH6g","vxHuNxqdTQA","2XYfcDzj-GM","hcKCzzU8Rn8","InASdG-p8Mg","AK5ctnBEzcY"],
 body:["E_IWbRUV3H8","UrUZZz6sZv4","s-9emTuZsJ0"],
 victory:"b3F4TMJ-LP4", pr:"DBkBnHYORew"
};
let app=JSON.parse(localStorage.getItem(STORE)||'{"current":null,"users":{}}'), profile=null;
function save(){if(app.current)app.users[app.current]=profile;localStorage.setItem(STORE,JSON.stringify(app))}
function clone(x){return JSON.parse(JSON.stringify(x))}
function esc(x){return String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function days(a,b){return Math.floor((new Date(b)-new Date(a))/(86400000))}
function defaultProfile(){return{module:"food",track:{food:0,training:0,body:0},dates:{food:today(),training:today(),body:today()},food:{records:{},dayTypes:[{id:"training",name:"訓練日"},{id:"carb",name:"補碳日"},{id:"rest",name:"休息日"}],strategies:{cutting:{name:"減脂肪",mode:"cut",targets:{training:{calories:2600,protein:160,fat:90,carbs:200},carb:{calories:2800,protein:160,fat:70,carbs:350},rest:{calories:2400,protein:160,fat:90,carbs:160}}},bulking:{name:"增肌",mode:"bulk",targets:{training:{calories:3200,protein:180,fat:80,carbs:430},carb:{calories:3400,protein:180,fat:70,carbs:500},rest:{calories:2900,protein:180,fat:90,carbs:330}}}}},training:{records:{}},body:{records:{}}}}
function login(id){id=(id||"").trim();if(!id)return alert("請輸入 ID");app.users[id]??=defaultProfile();app.current=id;profile=app.users[id];save();render()}
function logout(){save();app.current=null;profile=null;localStorage.setItem(STORE,JSON.stringify(app));renderLogin()}
function renderLogin(){root.innerHTML=`<section class="login"><div class="card login-card"><h1>深淵進化紀錄</h1><div class="muted">輸入 ID 建立或切換使用者。資料會保存在此裝置。</div><div class="section-title">使用者 ID</div><input id="loginId" placeholder="例如 waes" onkeydown="if(event.key==='Enter')login(this.value)"><div style="margin-top:12px" class="grid g2"><button class="primary" onclick="login(loginId.value)">進入</button><button onclick="showUsers()">查看既有 ID</button></div><div id="userList" class="muted" style="margin-top:12px"></div></div></section>`}
function showUsers(){let ids=Object.keys(app.users);userList.innerHTML=ids.length?ids.map(id=>`<button class="ghost" style="margin:4px" onclick="login('${esc(id)}')">${esc(id)}</button>`).join(""):"目前沒有既有 ID。"}
function switchModule(m){profile.module=m;save();render()}
function setDate(d){profile.dates[profile.module]=d;save();render()}
function jumpToday(){profile.dates[profile.module]=today();render()}
function getFood(d=profile.dates.food){profile.food.records[d]??={dayType:"training",strategy:"cutting",foods:[]};return profile.food.records[d]}
function getTrain(d=profile.dates.training){profile.training.records[d]??={type:"push",exercises:[],completed:false};return profile.training.records[d]}
function getBody(d=profile.dates.body){profile.body.records[d]??={weight:"",waist:"",arm:"",carb:false};return profile.body.records[d]}
function foodTotals(d=profile.dates.food){return getFood(d).foods.reduce((a,f)=>{a.calories+=+f.calories||0;a.protein+=+f.protein||0;a.fat+=+f.fat||0;a.carbs+=+f.carbs||0;return a},{calories:0,protein:0,fat:0,carbs:0})}
function dayName(id){return profile.food.dayTypes.find(x=>x.id===id)?.name||"未設定"}function typeName(t){return t==="push"?"推":t==="pull"?"拉":"腿"}
function musicBox(){let m=profile.module, arr=yt[m]||[]; if(!arr.length)return ""; let id=arr[profile.track[m]%arr.length]; return `<div class="panel"><div class="topbar"><div><div class="section-title">模組配樂</div><div class="muted">若手機擋自動播放，請點播放器開始。切換下一首會隨機使用此模組配樂池。</div></div><button onclick="nextTrack()">下一首</button></div><div class="musicbox"><iframe src="https://www.youtube.com/embed/${id}?rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe></div></div>`}
function nextTrack(){let m=profile.module;profile.track[m]=(profile.track[m]+1+Math.floor(Math.random()*3))%(yt[m].length);save();render()}
function render(){if(!app.current){renderLogin();return}profile=app.users[app.current];root.innerHTML=`<div class="app"><section class="hero"><div class="hero-top"><div><h1>深淵進化紀錄</h1><div class="muted">使用者：${esc(app.current)}｜科加斯、納瑟斯、卡利斯三檔案系統</div></div><div class="toolbar"><button onclick="exportAll()">匯出備份</button><button onclick="importFile.click()">匯入備份</button><button class="danger" onclick="logout()">登出</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importAll(event)"></div></div><div class="nav"><div class="nav-card chogath ${profile.module==="food"?"active":""}" onclick="switchModule('food')"><h2>科加斯檔案</h2><p class="muted">飲食、熱量、三大營養素。</p><div class="sigil">獸</div></div><div class="nav-card nasus ${profile.module==="training"?"active":""}" onclick="switchModule('training')"><h2>納瑟斯檔案</h2><p class="muted">訓練、PR、勝利動畫。</p><div class="sigil">神</div></div><div class="nav-card kalis ${profile.module==="body"?"active":""}" onclick="switchModule('body')"><h2>卡利斯檔案</h2><p class="muted">體重、腰圍、臂圍與趨勢。</p><div class="sigil">蟲</div></div></div></section><section class="content"><aside class="side"><button class="primary" onclick="jumpToday()">回到今天</button><div class="section-title" id="historyTitle">歷史紀錄</div><div class="history" id="historyList"></div></aside><main class="main" id="mainContent"></main></section></div>`;renderHistory(); if(profile.module==="food")renderFood(); if(profile.module==="training")renderTraining(); if(profile.module==="body")renderBody(); save()}
function renderHistory(){let html="",dates=[]; if(profile.module==="food"){historyTitle.textContent="科加斯歷史";dates=Object.keys(profile.food.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getFood(d),t=foodTotals(d);return `<button class="history-item ${d===profile.dates.food?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong><span class="pill gold">${dayName(r.dayType)}</span></div><div class="history-row muted"><span>${profile.food.strategies[r.strategy]?.name}</span><span>${t.calories.toFixed(0)} kcal</span></div></button>`}).join("")} if(profile.module==="training"){historyTitle.textContent="納瑟斯歷史";dates=Object.keys(profile.training.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getTrain(d);return `<button class="history-item ${d===profile.dates.training?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong><span class="pill gold">${typeName(r.type)}</span></div><div class="muted">${r.exercises.length} 個項目 ${r.completed?"｜已完成":""}</div></button>`}).join("")} if(profile.module==="body"){historyTitle.textContent="卡利斯歷史";dates=Object.keys(profile.body.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getBody(d);return `<button class="history-item ${d===profile.dates.body?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong>${r.carb?'<span class="pill purple">補碳日</span>':'<span class="pill blue">一般日</span>'}</div><div class="muted">${r.weight||"-"}kg / 腰${r.waist||"-"} / 臂${r.arm||"-"}</div></button>`}).join("")} historyList.innerHTML=html||'<div class="empty">尚無紀錄。</div>'}
function sumCard(label,val,target,key){let p=target?Math.min(100,val/target*100):0;return `<div class="sum"><div class="muted">${label}</div><div class="value">${(+val).toFixed(key==="calories"?0:1)}</div><div class="muted">目標：${target||"未設定"}</div><div class="progress"><span style="width:${p}%"></span></div></div>`}
function renderFood(){let d=profile.dates.food,r=getFood(),t=foodTotals(),target=profile.food.strategies[r.strategy]?.targets?.[r.dayType]||{};mainContent.innerHTML=`<div class="topbar"><div><h2>科加斯檔案｜${d}</h2><div class="muted">${profile.food.strategies[r.strategy]?.name}｜${dayName(r.dayType)}</div></div><div class="toolbar"><button onclick="openSettings()">設定方針</button><button class="danger" onclick="clearFood()">清除當日</button></div></div>${bodyAnalysis()}${musicBox()}<div class="panel"><div class="grid g3"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.food=this.value;render()"></div><div><div class="section-title">日型</div><select onchange="getFood().dayType=this.value;render()">${profile.food.dayTypes.map(x=>`<option value="${x.id}" ${x.id===r.dayType?"selected":""}>${x.name}</option>`).join("")}</select></div><div><div class="section-title">飲食方針</div><select onchange="getFood().strategy=this.value;render()">${Object.entries(profile.food.strategies).map(([id,s])=>`<option value="${id}" ${id===r.strategy?"selected":""}>${s.name}</option>`).join("")}</select></div></div></div><div class="summary">${sumCard("熱量",t.calories,target.calories,"calories")}${sumCard("蛋白質",t.protein,target.protein,"protein")}${sumCard("脂肪",t.fat,target.fat,"fat")}${sumCard("碳水",t.carbs,target.carbs,"carbs")}</div><div class="panel"><div class="section-title">新增食物</div><div class="grid g6"><input id="fn" placeholder="食物"><input id="fa" placeholder="份量"><input id="fc" type="number" placeholder="熱量"><input id="fp" type="number" placeholder="蛋白質"><input id="ff" type="number" placeholder="脂肪"><input id="fb" type="number" placeholder="碳水"></div><div style="margin-top:10px"><button class="primary" onclick="addFood()">新增</button></div></div><div class="panel"><table><thead><tr><th>食物</th><th>份量</th><th>熱量</th><th>蛋白質</th><th>脂肪</th><th>碳水</th><th></th></tr></thead><tbody>${r.foods.length?r.foods.map((f,i)=>`<tr><td>${esc(f.name)}</td><td>${esc(f.amount)}</td><td>${f.calories}</td><td>${f.protein}</td><td>${f.fat}</td><td>${f.carbs}</td><td><button class="danger" onclick="delFood(${i})">刪</button></td></tr>`).join(""):'<tr><td colspan="7" class="empty">尚無紀錄</td></tr>'}</tbody></table></div>`}
function addFood(){if(!fn.value.trim())return alert("請輸入食物");getFood().foods.push({name:fn.value,amount:fa.value,calories:+fc.value||0,protein:+fp.value||0,fat:+ff.value||0,carbs:+fb.value||0});render()}function delFood(i){getFood().foods.splice(i,1);render()}function clearFood(){if(confirm("清除當日飲食？")){getFood().foods=[];render()}}
function renderTraining(){let d=profile.dates.training,r=getTrain();mainContent.innerHTML=`<div class="topbar"><div><h2>納瑟斯檔案｜${d}</h2><div class="muted">完成訓練會觸發勝利動畫；超過過去同動作最佳重量或 reps 會觸發 PR。</div></div><div class="toolbar"><button onclick="inheritTraining()">繼承某日</button><button class="primary" onclick="completeTraining()">完成訓練</button><button class="danger" onclick="clearTrain()">清除</button></div></div>${musicBox()}<div class="panel"><div class="grid g3"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.training=this.value;render()"></div><div><div class="section-title">類型</div><select onchange="getTrain().type=this.value;render()"><option value="push" ${r.type==="push"?"selected":""}>推</option><option value="pull" ${r.type==="pull"?"selected":""}>拉</option><option value="legs" ${r.type==="legs"?"selected":""}>腿</option></select></div><div><div class="section-title">新增項目</div><div class="grid g2"><input id="exn" placeholder="槓鈴臥推"><button onclick="addEx()">新增</button></div></div></div></div><div class="panel">${r.exercises.length?r.exercises.map((ex,i)=>`<div class="exercise"><div class="topbar"><strong>${esc(ex.name)}</strong><div><button onclick="addSet(${i})">新增 set</button> <button class="danger" onclick="delEx(${i})">刪項目</button></div></div>${ex.sets.map((s,j)=>`<div class="setrow"><input type="number" value="${s.weight}" placeholder="重量" onchange="updSet(${i},${j},'weight',this.value)"><input type="number" value="${s.reps}" placeholder="reps" onchange="updSet(${i},${j},'reps',this.value)"><button class="danger" onclick="delSet(${i},${j})">刪</button></div>`).join("")}</div>`).join(""):'<div class="empty">尚無訓練項目</div>'}</div>`}
function addEx(){if(!exn.value.trim())return;getTrain().exercises.push({name:exn.value,sets:[{weight:"",reps:""}]});render()}function delEx(i){getTrain().exercises.splice(i,1);render()}function addSet(i){getTrain().exercises[i].sets.push({weight:"",reps:""});render()}function delSet(i,j){getTrain().exercises[i].sets.splice(j,1);render()}function updSet(i,j,k,v){getTrain().exercises[i].sets[j][k]=v;save()}
function inheritTraining(){let dates=Object.keys(profile.training.records).filter(d=>d!==profile.dates.training).sort((a,b)=>b.localeCompare(a));if(!dates.length)return alert("沒有可繼承日期");let src=prompt("輸入日期：\\n"+dates.join("\\n"));if(!src||!profile.training.records[src])return;let from=profile.training.records[src],cur=getTrain();cur.type=from.type;cur.exercises=clone(from.exercises).map(ex=>({name:ex.name,sets:ex.sets.map(()=>({weight:"",reps:""}))}));render()}
function best(name,before){let b={w:0,r:0};Object.entries(profile.training.records).forEach(([d,rec])=>{if(d>=before)return;(rec.exercises||[]).forEach(ex=>{if(ex.name!==name)return;(ex.sets||[]).forEach(s=>{b.w=Math.max(b.w,+s.weight||0);b.r=Math.max(b.r,+s.reps||0)})})});return b}
function completeTraining(){let d=profile.dates.training,r=getTrain(),prs=[];r.exercises.forEach(ex=>{let b=best(ex.name,d);ex.sets.forEach(s=>{if(+s.weight>b.w&&+s.weight>0)prs.push(ex.name+" 重量 PR");else if(+s.reps>b.r&&+s.reps>0)prs.push(ex.name+" reps PR")})});r.completed=true;showToast(prs.length?"LEGENDARY":"VICTORY",prs.length?prs.slice(0,2).join("｜"):"今日訓練完成");render()}
function clearTrain(){if(confirm("清除訓練？")){profile.training.records[profile.dates.training]={type:"push",exercises:[],completed:false};render()}}
function renderBody(){let d=profile.dates.body,r=getBody();mainContent.innerHTML=`<div class="topbar"><div><h2>卡利斯檔案｜${d}</h2><div class="muted">記錄體重、腰圍、臂圍與補碳日。</div></div><button class="danger" onclick="clearBody()">清除</button></div>${bodyAnalysis()}${musicBox()}<div class="panel"><div class="grid g4"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.body=this.value;render()"></div><div><div class="section-title">體重</div><input type="number" step="0.1" value="${r.weight}" onchange="getBody().weight=this.value;render()"></div><div><div class="section-title">腰圍</div><input type="number" step="0.1" value="${r.waist}" onchange="getBody().waist=this.value;render()"></div><div><div class="section-title">臂圍</div><input type="number" step="0.1" value="${r.arm}" onchange="getBody().arm=this.value;render()"></div></div><label style="display:block;margin-top:14px"><input style="width:auto" type="checkbox" ${r.carb?"checked":""} onchange="getBody().carb=this.checked;render()"> 補碳日</label></div><div class="panel"><div class="section-title">體重趨勢</div><div class="chart">${chart()}</div></div>`}
function clearBody(){if(confirm("清除體態？")){profile.body.records[profile.dates.body]={weight:"",waist:"",arm:"",carb:false};render()}}
function currentMode(){let r=getFood(profile.dates.food);return profile.food.strategies[r.strategy]?.mode||"cut"}
function bodyAnalysis(){let dates=Object.keys(profile.body.records).filter(d=>+profile.body.records[d].weight>0).sort();if(dates.length<2)return '<div class="alert ok">體重資料不足。累積至少兩筆後會開始分析。</div>';let mode=currentMode(),bestD=dates[0],bestW=+profile.body.records[bestD].weight;dates.forEach(d=>{let w=+profile.body.records[d].weight;if(mode==="cut"&&w<bestW){bestW=w;bestD=d}if(mode==="bulk"&&w>bestW){bestW=w;bestD=d}});let last=dates[dates.length-1],gap=days(bestD,last),label=mode==="cut"?"最低體重":"最高體重";return gap>=14?`<div class="alert">⚠️ 從 ${bestD} 到 ${last} 已經 ${gap} 天沒有刷新${label}。</div>`:`<div class="alert ok">趨勢正常：最近一次刷新${label}是 ${bestD}，距最新紀錄 ${gap} 天。</div>`}
function chart(){let pts=Object.keys(profile.body.records).filter(d=>+profile.body.records[d].weight>0).sort().map(d=>({d,w:+profile.body.records[d].weight,carb:profile.body.records[d].carb}));if(pts.length<2)return '<div class="empty">資料不足</div>';let W=700,H=210,p=20,min=Math.min(...pts.map(x=>x.w)),max=Math.max(...pts.map(x=>x.w));let x=i=>p+i*(W-2*p)/(pts.length-1),y=v=>H-p-(v-min)/(max-min||1)*(H-2*p);let path=pts.map((pt,i)=>(i?'L':'M')+x(i)+','+y(pt.w)).join(' ');return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="#f0d48a" stroke-width="4"/>${pts.map((pt,i)=>`<circle cx="${x(i)}" cy="${y(pt.w)}" r="${pt.carb?6:4}" fill="${pt.carb?'#7d3cff':'#2e8cff'}"></circle>`).join("")}</svg>`}
function openSettings(){let html=Object.entries(profile.food.strategies).map(([id,s])=>`<div class="panel"><h3>${s.name}</h3><div class="grid g2"><input data-id="${id}" data-field="name" value="${s.name}"><select data-id="${id}" data-field="mode"><option value="cut" ${s.mode==="cut"?"selected":""}>減脂：偵測最低體重</option><option value="bulk" ${s.mode==="bulk"?"selected":""}>增肌：偵測最高體重</option></select></div>${profile.food.dayTypes.map(day=>{let t=s.targets[day.id]||{};return `<div class="section-title">${day.name}</div><div class="grid g4"><input data-id="${id}" data-day="${day.id}" data-field="calories" value="${t.calories||0}" placeholder="熱量"><input data-id="${id}" data-day="${day.id}" data-field="protein" value="${t.protein||0}" placeholder="蛋白質"><input data-id="${id}" data-day="${day.id}" data-field="fat" value="${t.fat||0}" placeholder="脂肪"><input data-id="${id}" data-day="${day.id}" data-field="carbs" value="${t.carbs||0}" placeholder="碳水"></div>`}).join("")}</div>`).join("");settingsContent.innerHTML=html;settingsModal.classList.add("show")}
function closeSettings(){settingsModal.classList.remove("show")}function saveSettings(){document.querySelectorAll("#settingsContent input,#settingsContent select").forEach(el=>{let s=profile.food.strategies[el.dataset.id],f=el.dataset.field,d=el.dataset.day;if(f==="name")s.name=el.value;else if(f==="mode")s.mode=el.value;else{s.targets[d][f]=+el.value||0}});closeSettings();render()}
function showToast(t,s){toastTitle.textContent=t;toastSub.textContent=s;toastStage.classList.add("show");setTimeout(()=>toastStage.classList.remove("show"),1700)}
function exportAll(){save();let blob=new Blob([JSON.stringify(app,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="abyss_backup.json";a.click();URL.revokeObjectURL(url)}
function importAll(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{app=JSON.parse(r.result);profile=app.users[app.current];save();render()}catch{alert("匯入失敗")}};r.readAsText(file)}
if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
if(app.current&&app.users[app.current]){profile=app.users[app.current];render()}else renderLogin();
</script>
</body>
</html>
