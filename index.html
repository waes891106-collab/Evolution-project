<style>
:root{--bg:#05070a;--panel:#0b121c;--panel2:#111b28;--line:#28364a;--text:#f4e6c8;--muted:#9aa6b5;--gold:#c89b3c;--gold2:#f0d48a;--red:#b8333b;--purple:#7d3cff;--blue:#2e8cff;--green:#68d391;--danger:#ff5c6c;--shadow:0 28px 88px rgba(0,0,0,.56)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}body{background:radial-gradient(circle at 10% 8%,rgba(200,155,60,.22),transparent 25%),radial-gradient(circle at 86% 12%,rgba(46,140,255,.14),transparent 24%),radial-gradient(circle at 65% 92%,rgba(125,60,255,.18),transparent 28%),linear-gradient(135deg,#020308 0%,#0a111b 48%,#06080d 100%)}button,input,select,textarea{font:inherit}button{border:1px solid rgba(240,212,138,.28);border-radius:14px;padding:10px 13px;color:var(--text);background:linear-gradient(180deg,#1b2635,#0d141e);font-weight:900;cursor:pointer}button.primary{background:linear-gradient(180deg,#d4a84a,#7b571d);color:#101010;border-color:#f0d48a}button.danger{background:linear-gradient(180deg,#b8333b,#6b1f27);border-color:#ff7a83}button.ghost{background:rgba(255,255,255,.045)}input,select,textarea{width:100%;border:1px solid rgba(240,212,138,.22);border-radius:14px;background:rgba(3,7,12,.62);color:var(--text);padding:11px 12px;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(200,155,60,.12)}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(540px,100%);border:1px solid rgba(240,212,138,.28);border-radius:30px;padding:26px;background:linear-gradient(135deg,rgba(14,22,34,.96),rgba(5,8,14,.96));box-shadow:var(--shadow);position:relative;overflow:hidden}.login-card:before{content:"";position:absolute;inset:-120px;background:conic-gradient(from 180deg,transparent,rgba(200,155,60,.16),transparent,rgba(125,60,255,.16),transparent);animation:spin 12s linear infinite}.login-inner{position:relative}.logo-big{width:92px;height:92px;border-radius:28px;margin-bottom:14px;background:linear-gradient(135deg,var(--gold),var(--purple),var(--blue));display:grid;place-items:center;color:#05070a;font-weight:1000;font-size:38px}h1,h2,h3{letter-spacing:.3px}h1{font-size:32px;margin:0 0 8px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.app{width:min(1320px,calc(100% - 26px));margin:18px auto 34px}.hero{border:1px solid rgba(240,212,138,.28);border-radius:30px;background:linear-gradient(135deg,rgba(15,26,38,.96),rgba(7,9,13,.96));box-shadow:var(--shadow);padding:22px;position:relative;overflow:hidden}.hero-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;position:relative}.title-row{display:flex;align-items:center;gap:13px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--purple),var(--blue));display:grid;place-items:center;color:#05070a;font-weight:1000}.hero h1{font-size:30px;margin:0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}.nav-card{border-radius:22px;border:1px solid rgba(240,212,138,.22);padding:18px;min-height:132px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));cursor:pointer;position:relative;overflow:hidden}.nav-card.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.14),0 18px 48px rgba(0,0,0,.35)}.nav-card h2{margin:0;font-size:22px}.nav-card p{color:var(--muted);margin:8px 0 0;font-size:14px;line-height:1.45}.sigil{position:absolute;right:14px;bottom:4px;font-size:58px;opacity:.16}.chogath{background:radial-gradient(circle at right bottom,rgba(184,51,59,.42),transparent 38%),linear-gradient(135deg,rgba(45,9,18,.9),rgba(16,9,22,.95))}.nasus{background:radial-gradient(circle at right bottom,rgba(200,155,60,.42),transparent 38%),linear-gradient(135deg,rgba(28,29,32,.92),rgba(9,12,16,.96))}.kalis{background:radial-gradient(circle at right bottom,rgba(46,140,255,.36),transparent 38%),linear-gradient(135deg,rgba(31,18,70,.92),rgba(5,14,28,.96))}.content{margin-top:18px;display:grid;grid-template-columns:320px 1fr;gap:18px}.side,.main,.modal-card{border:1px solid rgba(240,212,138,.22);border-radius:24px;background:rgba(10,16,24,.82);box-shadow:var(--shadow);padding:18px;backdrop-filter:blur(10px)}.side{height:calc(100vh - 288px);min-height:530px;position:sticky;top:14px;overflow:hidden;display:flex;flex-direction:column}.section-title{font-size:13px;letter-spacing:.8px;color:var(--gold2);font-weight:900;margin:14px 0 8px;text-transform:uppercase}.history{overflow:auto;flex:1;padding-right:4px}.history-item{width:100%;text-align:left;margin-bottom:10px;padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text)}.history-item.active{border-color:var(--gold);background:rgba(200,155,60,.08)}.history-row{display:flex;justify-content:space-between;gap:8px}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:900;border:1px solid rgba(255,255,255,.12)}.pill.red{background:rgba(184,51,59,.18);color:#ff9aa2}.pill.gold{background:rgba(200,155,60,.18);color:#f0d48a}.pill.blue{background:rgba(46,140,255,.18);color:#9cc9ff}.pill.purple{background:rgba(125,60,255,.18);color:#c2a8ff}.pill.grey{background:rgba(150,160,170,.15);color:#cbd5e1}.pill.green{background:rgba(104,211,145,.15);color:#a7f3c3}.topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}.topbar h2{margin:0;font-size:26px}.panel{border:1px solid rgba(255,255,255,.08);border-radius:20px;background:rgba(255,255,255,.035);padding:16px;margin-bottom:16px}.grid{display:grid;gap:10px}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}.grid-6{grid-template-columns:1.2fr .8fr repeat(4,.7fr)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.summary-card{padding:15px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(240,212,138,.16)}.summary-card .value{font-size:25px;font-weight:950;margin-top:4px}.summary-card .target{font-size:12px;color:var(--muted);margin-top:4px}.progress{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2))}table{width:100%;border-collapse:collapse}th,td{padding:11px 9px;border-bottom:1px solid rgba(255,255,255,.08);text-align:center;font-size:14px}th{color:var(--gold2);font-size:12px}td:first-child,th:first-child{text-align:left}.empty{text-align:center;color:var(--muted);padding:28px}.exercise-card{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;margin-bottom:12px;background:rgba(255,255,255,.035)}.exercise-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.set-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:8px}.chart{height:230px;border-radius:18px;background:linear-gradient(180deg,rgba(46,140,255,.08),rgba(125,60,255,.05));border:1px solid rgba(255,255,255,.08);padding:12px;overflow:hidden}svg{width:100%;height:100%}.alert{border:1px solid rgba(255,92,108,.4);background:rgba(255,92,108,.09);border-radius:18px;padding:14px;margin-bottom:16px}.ok{border-color:rgba(104,211,145,.35);background:rgba(104,211,145,.08)}.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.64);padding:20px;overflow:auto}.modal.show{display:grid;place-items:start center}.modal-card{width:min(940px,100%);background:#0c121b;margin-top:24px}.modal-header{display:flex;justify-content:space-between;gap:14px;margin-bottom:14px}.toast-stage{position:fixed;inset:0;display:none;place-items:center;z-index:80;pointer-events:none;background:radial-gradient(circle,rgba(200,155,60,.12),transparent 45%)}.toast-stage.show{display:grid;animation:fade .3s ease}.toast{min-width:min(520px,92vw);text-align:center;border:1px solid var(--gold);border-radius:28px;padding:30px 24px;background:linear-gradient(135deg,rgba(8,12,18,.94),rgba(20,15,8,.94));box-shadow:0 0 70px rgba(200,155,60,.36);animation:slam 1.7s ease forwards;position:relative;overflow:hidden}.toast:before{content:"";position:absolute;inset:-30%;background:conic-gradient(transparent,rgba(240,212,138,.28),transparent,rgba(125,60,255,.24),transparent);animation:spin 2.2s linear infinite}.toast-inner{position:relative}.toast-title{font-size:44px;font-weight:1000;color:var(--gold2);letter-spacing:1px;text-shadow:0 0 18px rgba(240,212,138,.56)}.toast-sub{margin-top:8px;font-size:18px;color:var(--text)}@keyframes spin{to{transform:rotate(360deg)}}@keyframes slam{0%{transform:scale(.76);opacity:0}18%{transform:scale(1.06);opacity:1}80%{transform:scale(1);opacity:1}100%{transform:scale(.96);opacity:0}}@keyframes fade{from{opacity:0}to{opacity:1}}@media(max-width:980px){.content{grid-template-columns:1fr}.side{height:auto;min-height:0;position:static;max-height:360px}.nav{grid-template-columns:1fr}.summary,.grid-4,.grid-6{grid-template-columns:1fr 1fr}.hero-top,.topbar{flex-direction:column}.toolbar{justify-content:flex-start}}@media(max-width:600px){.app{width:calc(100% - 14px);margin:8px auto}.hero,.side,.main{padding:14px;border-radius:20px}.summary,.grid-2,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr}table{display:block;overflow-x:auto}.hero h1{font-size:22px}.toast-title{font-size:32px}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-stage" id="toastStage"><div class="toast"><div class="toast-inner"><div class="toast-title" id="toastTitle">VICTORY</div><div class="toast-sub" id="toastSub">今日訓練完成</div></div></div></div>
<div class="modal" id="settingsModal"><div class="modal-card"><div class="modal-header"><div><h2 style="margin:0">設定科加斯飲食方針</h2><div class="muted">可修改減脂肪/增肌在不同日型下的文字與目標數值。</div></div><button onclick="closeSettings()">關閉</button></div><div id="settingsContent"></div><div class="panel"><div class="section-title">新增自訂飲食方針</div><div class="grid grid-2"><input id="newStrategyName" placeholder="例如 維持體重 / 小幅增肌"><button onclick="addStrategy()">新增方針</button></div></div><button class="primary" onclick="saveSettings()">儲存設定</button> <button class="ghost" onclick="resetSettings()">恢復預設</button></div></div>
<script>
const STORE="abyssEvolutionV2";const today=()=>new Date().toISOString().slice(0,10);function clone(x){return JSON.parse(JSON.stringify(x))}function esc(x){return String(x??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}function daysBetween(a,b){return Math.floor((new Date(b)-new Date(a))/(1000*60*60*24))}
const defaultProfile=()=>({module:"food",soundOn:true,musicOn:false,dates:{food:today(),training:today(),body:today()},food:{records:{},dayTypes:[{id:"training",name:"訓練日"},{id:"carb",name:"補碳日"},{id:"rest",name:"休息日"}],strategies:{cutting:{name:"減脂肪",mode:"cut",notes:{training:"訓練日 2600 kcal / 蛋白質 160g / 脂肪 90g / 碳水 200g",carb:"補碳日 2800 kcal / 蛋白質 160g / 脂肪 70g / 碳水 350g",rest:"休息日 2400 kcal / 蛋白質 160g / 脂肪 90g / 碳水 160g"},targets:{training:{calories:2600,protein:160,fat:90,carbs:200},carb:{calories:2800,protein:160,fat:70,carbs:350},rest:{calories:2400,protein:160,fat:90,carbs:160}}},bulking:{name:"增肌",mode:"bulk",notes:{training:"訓練日 3200 kcal / 蛋白質 180g / 脂肪 80g / 碳水 430g",carb:"補碳日 3400 kcal / 蛋白質 180g / 脂肪 70g / 碳水 500g",rest:"休息日 2900 kcal / 蛋白質 180g / 脂肪 90g / 碳水 330g"},targets:{training:{calories:3200,protein:180,fat:80,carbs:430},carb:{calories:3400,protein:180,fat:70,carbs:500},rest:{calories:2900,protein:180,fat:90,carbs:330}}}}},training:{records:{}},body:{records:{}}});
let app=loadApp(),profile=null,audioCtx=null,musicNodes=null;function loadApp(){try{return JSON.parse(localStorage.getItem(STORE))||{currentUser:null,users:{}}}catch{return{currentUser:null,users:{}}}}function saveApp(){if(profile&&app.currentUser)app.users[app.currentUser]=profile;localStorage.setItem(STORE,JSON.stringify(app))}function login(id){id=(id||"").trim();if(!id)return alert("請輸入 ID");app.users[id]??=defaultProfile();app.currentUser=id;profile=app.users[id];saveApp();render()}function logout(){saveApp();profile=null;app.currentUser=null;localStorage.setItem(STORE,JSON.stringify(app));stopMusic();renderLogin()}
function renderLogin(){document.getElementById("root").innerHTML=`<section class="login"><div class="login-card"><div class="login-inner"><div class="logo-big">Δ</div><h1>深淵進化紀錄</h1><div class="muted">輸入 ID 即可建立或切換使用者。同一支手機可多人使用，資料彼此獨立。</div><div class="section-title">使用者 ID</div><input id="loginId" placeholder="例如 waes / girlfriend / coach" onkeydown="if(event.key==='Enter')login(this.value)"><div style="margin-top:12px" class="grid grid-2"><button class="primary" onclick="login(loginId.value)">進入檔案庫</button><button class="ghost" onclick="showUsers()">查看既有 ID</button></div><div id="userList" class="muted" style="margin-top:14px"></div></div></div></section>`}function showUsers(){const ids=Object.keys(app.users);userList.innerHTML=ids.length?"既有 ID："+ids.map(id=>`<button class="ghost" style="margin:4px" onclick="login('${esc(id)}')">${esc(id)}</button>`).join(""):"目前沒有既有 ID。"}
function render(){if(!app.currentUser){renderLogin();return}profile=app.users[app.currentUser]||defaultProfile();if(profile.musicOn)startMusic();else stopMusic();document.getElementById("root").innerHTML=`<div class="app"><section class="hero"><div class="hero-top"><div class="title-row"><div class="logo">Δ</div><div><h1>深淵進化紀錄</h1><div class="muted">使用者：${esc(app.currentUser)}｜本機資料，多人獨立。</div></div></div><div class="toolbar"><button class="ghost" onclick="toggleMusic()">${profile.musicOn?"關閉配樂":"開啟配樂"}</button><button class="ghost" onclick="toggleSound()">${profile.soundOn?"關閉音效":"開啟音效"}</button><button class="ghost" onclick="exportAll()">匯出備份</button><button class="ghost" onclick="importFile.click()">匯入備份</button><button class="danger" onclick="logout()">登出</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importAll(event)"></div></div><div class="nav"><div class="nav-card chogath ${profile.module==="food"?"active":""}" onclick="switchModule('food')"><h2>科加斯檔案</h2><p>飲食、熱量、三大營養素、減脂/增肌方針。</p><div class="sigil">獸</div></div><div class="nav-card nasus ${profile.module==="training"?"active":""}" onclick="switchModule('training')"><h2>納瑟斯檔案</h2><p>推、拉、腿訓練紀錄。PR 系統與勝利動畫。</p><div class="sigil">神</div></div><div class="nav-card kalis ${profile.module==="body"?"active":""}" onclick="switchModule('body')"><h2>卡利斯檔案</h2><p>體重、腰圍、臂圍、補碳日與趨勢分析。</p><div class="sigil">蟲</div></div></div></section><section class="content"><aside class="side"><button class="primary" onclick="jumpToday()">回到今天</button><div class="section-title" id="historyTitle">歷史紀錄</div><div class="history" id="historyList"></div></aside><main class="main" id="mainContent"></main></section></div>`;renderHistory();if(profile.module==="food")renderFood();if(profile.module==="training")renderTraining();if(profile.module==="body")renderBody();saveApp()}
function switchModule(m){profile.module=m;render()}function jumpToday(){profile.dates[profile.module]=today();render()}function setDate(d){profile.dates[profile.module]=d;render()}function getFoodRecord(date=profile.dates.food){profile.food.records[date]??={dayType:"training",strategy:"cutting",foods:[]};return profile.food.records[date]}function getTrainingRecord(date=profile.dates.training){profile.training.records[date]??={type:"push",exercises:[],completed:false};return profile.training.records[date]}function getBodyRecord(date=profile.dates.body){profile.body.records[date]??={weight:"",waist:"",arm:"",carb:false};return profile.body.records[date]}function foodTotals(date=profile.dates.food){return getFoodRecord(date).foods.reduce((a,f)=>{a.calories+=+f.calories||0;a.protein+=+f.protein||0;a.fat+=+f.fat||0;a.carbs+=+f.carbs||0;return a},{calories:0,protein:0,fat:0,carbs:0})}function dayName(id){return profile.food.dayTypes.find(x=>x.id===id)?.name||"未設定"}function dayClass(id){return id==="training"?"gold":id==="carb"?"purple":id==="rest"?"grey":"grey"}function typeName(t){return t==="push"?"推":t==="pull"?"拉":"腿"}
function renderHistory(){let dates=[],html="";if(profile.module==="food"){historyTitle.textContent="科加斯歷史飲食";dates=Object.keys(profile.food.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getFoodRecord(d),t=foodTotals(d);return `<button class="history-item ${d===profile.dates.food?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong><span class="pill ${dayClass(r.dayType)}">${dayName(r.dayType)}</span></div><div class="history-row muted"><span>${profile.food.strategies[r.strategy]?.name||""}</span><span>${t.calories.toFixed(0)} kcal</span></div></button>`}).join("")}if(profile.module==="training"){historyTitle.textContent="納瑟斯歷史訓練";dates=Object.keys(profile.training.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getTrainingRecord(d);return `<button class="history-item ${d===profile.dates.training?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong><span class="pill gold">${typeName(r.type)}</span></div><div class="muted">${r.exercises.length} 個項目 ${r.completed?"｜已完成":""}</div></button>`}).join("")}if(profile.module==="body"){historyTitle.textContent="卡利斯歷史體態";dates=Object.keys(profile.body.records).sort((a,b)=>b.localeCompare(a));html=dates.map(d=>{let r=getBodyRecord(d);return `<button class="history-item ${d===profile.dates.body?"active":""}" onclick="setDate('${d}')"><div class="history-row"><strong>${d}</strong>${r.carb?'<span class="pill purple">補碳日</span>':'<span class="pill blue">一般日</span>'}</div><div class="muted">${r.weight||"-"} kg / 腰 ${r.waist||"-"} / 臂 ${r.arm||"-"}</div></button>`}).join("")}historyList.innerHTML=html||'<div class="empty">尚無紀錄。</div>'}
function renderFood(){const d=profile.dates.food,r=getFoodRecord(),t=foodTotals(),target=profile.food.strategies[r.strategy]?.targets?.[r.dayType]||{},note=profile.food.strategies[r.strategy]?.notes?.[r.dayType]||"尚未設定",analysis=bodyTrendAnalysis();mainContent.innerHTML=`<div class="topbar"><div><h2>科加斯檔案｜${d===today()?"今日飲食":d}</h2><div class="muted">${profile.food.strategies[r.strategy]?.name||""}｜${dayName(r.dayType)}：${esc(note)}</div></div><div class="toolbar"><button class="ghost" onclick="openSettings()">設定方針</button><button class="danger" onclick="clearFood()">清除當日</button></div></div>${analysis.html}<div class="panel"><div class="grid grid-3"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.food=this.value;render()"></div><div><div class="section-title">小標籤</div><select onchange="getFoodRecord().dayType=this.value;render()">${profile.food.dayTypes.map(x=>`<option value="${x.id}" ${x.id===r.dayType?"selected":""}>${x.name}</option>`).join("")}</select></div><div><div class="section-title">飲食方針</div><select onchange="getFoodRecord().strategy=this.value;render()">${Object.entries(profile.food.strategies).map(([id,s])=>`<option value="${id}" ${id===r.strategy?"selected":""}>${s.name}</option>`).join("")}</select></div></div></div><div class="summary">${summaryCard("熱量 kcal",t.calories,target.calories,"calories")}${summaryCard("蛋白質 g",t.protein,target.protein,"protein")}${summaryCard("脂肪 g",t.fat,target.fat,"fat")}${summaryCard("碳水 g",t.carbs,target.carbs,"carbs")}</div><div class="panel"><div class="section-title">新增食物</div><div class="grid grid-6"><input id="foodName" placeholder="食物名稱"><input id="foodAmount" placeholder="份量"><input id="foodCal" type="number" placeholder="熱量"><input id="foodPro" type="number" placeholder="蛋白質"><input id="foodFat" type="number" placeholder="脂肪"><input id="foodCarb" type="number" placeholder="碳水"></div><div style="margin-top:10px"><button class="primary" onclick="addFood()">新增</button></div></div><div class="panel"><div class="section-title">當日明細</div><table><thead><tr><th>食物</th><th>份量</th><th>熱量</th><th>蛋白質</th><th>脂肪</th><th>碳水</th><th></th></tr></thead><tbody>${r.foods.length?r.foods.map((f,i)=>`<tr><td><strong>${esc(f.name)}</strong></td><td>${esc(f.amount)}</td><td>${(+f.calories).toFixed(1)}</td><td>${(+f.protein).toFixed(1)}</td><td>${(+f.fat).toFixed(1)}</td><td>${(+f.carbs).toFixed(1)}</td><td><button class="danger" onclick="deleteFood(${i})">刪除</button></td></tr>`).join(""):'<tr><td colspan="7" class="empty">這一天還沒有紀錄食物。</td></tr>'}</tbody></table></div>`}function summaryCard(label,val,target,key){const p=target?Math.min(100,val/target*100):0;return `<div class="summary-card"><div class="muted">${label}</div><div class="value">${(+val).toFixed(key==="calories"?0:1)}</div><div class="target">目標：${target||"未設定"}</div><div class="progress"><span style="width:${p}%"></span></div></div>`}function addFood(){const f={name:foodName.value.trim(),amount:foodAmount.value.trim(),calories:+foodCal.value||0,protein:+foodPro.value||0,fat:+foodFat.value||0,carbs:+foodCarb.value||0};if(!f.name)return alert("請輸入食物名稱");getFoodRecord().foods.push(f);playSound("click");render()}function deleteFood(i){getFoodRecord().foods.splice(i,1);render()}function clearFood(){if(confirm("清除這天所有飲食紀錄？")){getFoodRecord().foods=[];render()}}
function renderTraining(){const d=profile.dates.training,r=getTrainingRecord();mainContent.innerHTML=`<div class="topbar"><div><h2>納瑟斯檔案｜${d===today()?"今日訓練":d}</h2><div class="muted">PR 系統：同一動作相較過去紀錄，重量更高或 reps 更多即觸發突破動畫。</div></div><div class="toolbar"><button class="ghost" onclick="inheritTraining()">繼承某一天項目</button><button class="primary" onclick="completeTraining()">完成今日訓練</button><button class="danger" onclick="clearTraining()">清除當日</button></div></div><div class="panel"><div class="grid grid-3"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.training=this.value;render()"></div><div><div class="section-title">訓練類型</div><select onchange="getTrainingRecord().type=this.value;render()"><option value="push" ${r.type==="push"?"selected":""}>推</option><option value="pull" ${r.type==="pull"?"selected":""}>拉</option><option value="legs" ${r.type==="legs"?"selected":""}>腿</option></select></div><div><div class="section-title">新增項目</div><div class="grid grid-2"><input id="newExerciseName" placeholder="例如 槓鈴臥推"><button class="primary" onclick="addExercise()">新增</button></div></div></div></div><div class="panel"><div class="section-title">${typeName(r.type)}｜訓練項目 ${r.completed?'<span class="pill green">已完成</span>':''}</div>${r.exercises.length?r.exercises.map((ex,ei)=>exerciseHTML(ex,ei)).join(""):'<div class="empty">尚未新增訓練項目。</div>'}</div>`}function exerciseHTML(ex,ei){return `<div class="exercise-card"><div class="exercise-head"><strong>${esc(ex.name)}</strong><div><button onclick="addSet(${ei})">新增 set</button> <button class="danger" onclick="deleteExercise(${ei})">刪除項目</button></div></div>${ex.sets.map((s,si)=>`<div class="set-row"><input type="number" value="${s.weight??""}" placeholder="重量，可空白" onchange="updateSet(${ei},${si},'weight',this.value)"><input type="number" value="${s.reps??""}" placeholder="reps" onchange="updateSet(${ei},${si},'reps',this.value)"><button class="danger" onclick="deleteSet(${ei},${si})">刪除</button></div>`).join("")||'<div class="muted">尚無 set。</div>'}</div>`}function addExercise(){let name=newExerciseName.value.trim();if(!name)return alert("請輸入項目名稱");getTrainingRecord().exercises.push({name,sets:[{weight:"",reps:""}]});playSound("click");render()}function deleteExercise(i){getTrainingRecord().exercises.splice(i,1);render()}function addSet(i){getTrainingRecord().exercises[i].sets.push({weight:"",reps:""});render()}function deleteSet(i,j){getTrainingRecord().exercises[i].sets.splice(j,1);render()}function updateSet(i,j,k,v){getTrainingRecord().exercises[i].sets[j][k]=v;saveApp()}function clearTraining(){if(confirm("清除這天所有訓練紀錄？")){profile.training.records[profile.dates.training]={type:"push",exercises:[],completed:false};render()}}function inheritTraining(){const dates=Object.keys(profile.training.records).filter(d=>d!==profile.dates.training).sort((a,b)=>b.localeCompare(a));if(!dates.length)return alert("沒有可繼承的過去訓練日。");const src=prompt("輸入要繼承的日期：\n"+dates.slice(0,20).join("\n"));if(!src||!profile.training.records[src])return;const from=profile.training.records[src],cur=getTrainingRecord();cur.type=from.type;cur.exercises=clone(from.exercises).map(ex=>({name:ex.name,sets:ex.sets.map(()=>({weight:"",reps:""}))}));playSound("click");render()}function bestForExercise(name,beforeDate){let best={weight:0,reps:0,volume:0};Object.entries(profile.training.records).forEach(([d,r])=>{if(d>=beforeDate)return;(r.exercises||[]).forEach(ex=>{if(ex.name!==name)return;(ex.sets||[]).forEach(s=>{let w=+s.weight||0,reps=+s.reps||0;best.weight=Math.max(best.weight,w);best.reps=Math.max(best.reps,reps);best.volume=Math.max(best.volume,w*reps)})})});return best}function completeTraining(){const d=profile.dates.training,r=getTrainingRecord();let prs=[];r.exercises.forEach(ex=>{let best=bestForExercise(ex.name,d);ex.sets.forEach(s=>{let w=+s.weight||0,reps=+s.reps||0;if(w>best.weight&&w>0)prs.push(`${ex.name} 重量 PR：${w}`);else if(reps>best.reps&&reps>0)prs.push(`${ex.name} reps PR：${reps}`);else if(w*reps>best.volume&&w>0&&reps>0)prs.push(`${ex.name} 容量 PR`)})});r.completed=true;saveApp();if(prs.length){showToast("LEGENDARY",prs.slice(0,2).join("｜"));playSound("pr")}else{showToast("VICTORY","今日訓練完成");playSound("victory")}render()}
function renderBody(){const d=profile.dates.body,r=getBodyRecord(),analysis=bodyTrendAnalysis();mainContent.innerHTML=`<div class="topbar"><div><h2>卡利斯檔案｜${d===today()?"今日體態":d}</h2><div class="muted">體重、腰圍、臂圍、補碳日與趨勢分析。</div></div><div class="toolbar"><button class="danger" onclick="clearBody()">清除當日</button></div></div>${analysis.html}<div class="panel"><div class="grid grid-4"><div><div class="section-title">日期</div><input type="date" value="${d}" onchange="profile.dates.body=this.value;render()"></div><div><div class="section-title">體重 kg</div><input type="number" step="0.1" value="${esc(r.weight)}" onchange="getBodyRecord().weight=this.value;render()"></div><div><div class="section-title">腰圍 cm</div><input type="number" step="0.1" value="${esc(r.waist)}" onchange="getBodyRecord().waist=this.value;render()"></div><div><div class="section-title">臂圍 cm</div><input type="number" step="0.1" value="${esc(r.arm)}" onchange="getBodyRecord().arm=this.value;render()"></div></div><div style="margin-top:14px"><label><input type="checkbox" style="width:auto" ${r.carb?"checked":""} onchange="getBodyRecord().carb=this.checked;render()"> 補碳日</label></div></div><div class="panel"><div class="section-title">體重趨勢</div><div class="chart">${weightChartSVG()}</div></div><div class="panel"><div class="section-title">目前紀錄</div><div class="summary"><div class="summary-card"><div class="muted">體重</div><div class="value">${r.weight||"-"}</div></div><div class="summary-card"><div class="muted">腰圍</div><div class="value">${r.waist||"-"}</div></div><div class="summary-card"><div class="muted">臂圍</div><div class="value">${r.arm||"-"}</div></div><div class="summary-card"><div class="muted">標籤</div><div class="value" style="font-size:20px">${r.carb?"補碳日":"一般日"}</div></div></div></div>`}function clearBody(){if(confirm("清除這天的體態紀錄？")){profile.body.records[profile.dates.body]={weight:"",waist:"",arm:"",carb:false};render()}}function currentStrategyMode(){const fr=getFoodRecord(profile.dates.food);return profile.food.strategies[fr.strategy]?.mode||(fr.strategy==="bulking"?"bulk":"cut")}function bodyTrendAnalysis(){const dates=Object.keys(profile.body.records).filter(d=>+profile.body.records[d].weight>0).sort();if(dates.length<2)return{html:'<div class="alert ok">體重資料不足。累積至少兩筆後會開始分析趨勢。</div>'};const mode=currentStrategyMode();let bestDate=dates[0],best=+profile.body.records[bestDate].weight;dates.forEach(d=>{const w=+profile.body.records[d].weight;if(mode==="cut"&&w<best){best=w;bestDate=d}if(mode==="bulk"&&w>best){best=w;bestDate=d}});const last=dates[dates.length-1],gap=daysBetween(bestDate,last),goal=mode==="cut"?"最低體重":"最高體重";if(gap>=14)return{html:`<div class="alert">⚠️ ${mode==="cut"?"減脂偵測":"增肌偵測"}：從 ${bestDate} 到 ${last} 已經 ${gap} 天沒有刷新${goal}（目前紀錄：${best} kg）。</div>`};return{html:`<div class="alert ok">趨勢正常：最近一次刷新${goal}是 ${bestDate}（${best} kg），距離最新紀錄 ${gap} 天。</div>`}}function weightChartSVG(){const points=Object.keys(profile.body.records).filter(d=>+profile.body.records[d].weight>0).sort().map(d=>({d,w:+profile.body.records[d].weight,carb:!!profile.body.records[d].carb}));if(points.length<2)return '<div class="empty">體重資料不足，無法畫趨勢圖。</div>';const min=Math.min(...points.map(p=>p.w)),max=Math.max(...points.map(p=>p.w)),pad=20,w=700,h=210;const x=i=>pad+i*(w-2*pad)/(points.length-1),y=v=>h-pad-(v-min)/(max-min||1)*(h-2*pad),path=points.map((p,i)=>`${i?'L':'M'}${x(i)},${y(p.w)}`).join(" ");return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="#f0d48a" stroke-width="4"/><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="rgba(255,255,255,.2)"/><text x="${pad}" y="16" fill="#9aa6b5" font-size="12">${max.toFixed(1)} kg</text><text x="${pad}" y="${h-5}" fill="#9aa6b5" font-size="12">${min.toFixed(1)} kg</text>${points.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.w)}" r="${p.carb?6:4}" fill="${p.carb?'#7d3cff':'#2e8cff'}"><title>${p.d} ${p.w}kg</title></circle>`).join("")}</svg>`}
function openSettings(){renderSettings();settingsModal.classList.add("show")}function closeSettings(){settingsModal.classList.remove("show")}function renderSettings(){settingsContent.innerHTML=Object.entries(profile.food.strategies).map(([sid,s])=>`<div class="panel"><h3>${esc(s.name)}</h3><div class="grid grid-3"><input data-sid="${sid}" data-field="name" value="${esc(s.name)}"><select data-sid="${sid}" data-field="mode"><option value="cut" ${s.mode==="cut"?"selected":""}>減脂偵測：最低體重</option><option value="bulk" ${s.mode==="bulk"?"selected":""}>增肌偵測：最高體重</option></select><span></span></div>${profile.food.dayTypes.map(day=>{let tar=s.targets?.[day.id]||{},note=s.notes?.[day.id]||"";return `<div class="section-title">${day.name}</div><input data-sid="${sid}" data-day="${day.id}" data-field="note" value="${esc(note)}"><div class="grid grid-4" style="margin-top:8px"><input data-sid="${sid}" data-day="${day.id}" data-field="calories" type="number" value="${tar.calories??""}" placeholder="熱量"><input data-sid="${sid}" data-day="${day.id}" data-field="protein" type="number" value="${tar.protein??""}" placeholder="蛋白質"><input data-sid="${sid}" data-day="${day.id}" data-field="fat" type="number" value="${tar.fat??""}" placeholder="脂肪"><input data-sid="${sid}" data-day="${day.id}" data-field="carbs" type="number" value="${tar.carbs??""}" placeholder="碳水"></div>`}).join("")}${sid!=="cutting"&&sid!=="bulking"?`<br><button class="danger" onclick="deleteStrategy('${sid}')">刪除此方針</button>`:""}</div>`).join("")}function saveSettings(){document.querySelectorAll("#settingsContent input,#settingsContent select").forEach(input=>{let sid=input.dataset.sid,day=input.dataset.day,field=input.dataset.field;if(field==="name"){profile.food.strategies[sid].name=input.value.trim()||profile.food.strategies[sid].name;return}if(field==="mode"){profile.food.strategies[sid].mode=input.value;return}profile.food.strategies[sid].targets??={};profile.food.strategies[sid].targets[day]??={};profile.food.strategies[sid].notes??={};if(field==="note")profile.food.strategies[sid].notes[day]=input.value;else profile.food.strategies[sid].targets[day][field]=+input.value||0});renderSettings();render();alert("已儲存")}function addStrategy(){let name=newStrategyName.value.trim();if(!name)return alert("請輸入方針名稱");let id="custom_"+Date.now();profile.food.strategies[id]={name,mode:"cut",notes:{},targets:{}};profile.food.dayTypes.forEach(d=>{profile.food.strategies[id].notes[d.id]=`${d.name} 尚未設定`;profile.food.strategies[id].targets[d.id]={calories:0,protein:0,fat:0,carbs:0}});renderSettings();render()}function deleteStrategy(id){if(confirm("刪除此自訂方針？")){delete profile.food.strategies[id];Object.values(profile.food.records).forEach(r=>{if(r.strategy===id)r.strategy="cutting"});renderSettings();render()}}function resetSettings(){if(confirm("恢復預設飲食方針？飲食紀錄會保留。")){const fresh=defaultProfile();profile.food.dayTypes=fresh.food.dayTypes;profile.food.strategies=fresh.food.strategies;renderSettings();render()}}
function showToast(title,sub){toastTitle.textContent=title;toastSub.textContent=sub;toastStage.classList.add("show");setTimeout(()=>toastStage.classList.remove("show"),1800)}function audio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}function tone(freq,dur,type="sine",gain=.06,delay=0){if(!profile.soundOn)return;const ctx=audio(),o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(gain,ctx.currentTime+delay+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+dur);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur+.03)}function playSound(kind){if(!profile.soundOn)return;if(kind==="pr"){tone(392,.18,"triangle",.08,0);tone(523,.2,"triangle",.08,.12);tone(784,.28,"triangle",.08,.26)}else if(kind==="victory"){tone(330,.16,"triangle",.06,0);tone(440,.18,"triangle",.06,.12);tone(660,.24,"triangle",.06,.26)}else tone(260,.08,"sine",.035,0)}function toggleSound(){profile.soundOn=!profile.soundOn;playSound("click");render()}function toggleMusic(){profile.musicOn=!profile.musicOn;if(profile.musicOn){startMusic();playSound("victory")}else stopMusic();render()}function startMusic(){if(musicNodes||!profile.musicOn)return;const ctx=audio(),gain=ctx.createGain();gain.gain.value=.018;gain.connect(ctx.destination);const osc1=ctx.createOscillator(),osc2=ctx.createOscillator(),lfo=ctx.createOscillator(),lfoGain=ctx.createGain();osc1.type="sawtooth";osc2.type="triangle";osc1.frequency.value=55;osc2.frequency.value=82.41;lfo.frequency.value=.08;lfoGain.gain.value=8;lfo.connect(lfoGain);lfoGain.connect(osc1.frequency);osc1.connect(gain);osc2.connect(gain);osc1.start();osc2.start();lfo.start();musicNodes={osc1,osc2,lfo,gain}}function stopMusic(){if(!musicNodes)return;try{musicNodes.gain.gain.exponentialRampToValueAtTime(.0001,audio().currentTime+.2);setTimeout(()=>{Object.values(musicNodes).forEach(n=>{try{n.stop&&n.stop()}catch{}});musicNodes=null},250)}catch{musicNodes=null}}
function exportAll(){saveApp();const blob=new Blob([JSON.stringify({currentUser:app.currentUser,users:app.users},null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`abyss_evolution_backup_${today()}.json`;a.click();URL.revokeObjectURL(url)}function importAll(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);app=data.users?data:{currentUser:null,users:data};if(!app.currentUser)app.currentUser=Object.keys(app.users)[0]||null;profile=app.currentUser?app.users[app.currentUser]:null;saveApp();render();alert("匯入完成")}catch{alert("匯入失敗，檔案格式不正確")}};reader.readAsText(file)}if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}if(app.currentUser&&app.users[app.currentUser]){profile=app.users[app.currentUser];render()}else renderLogin();
</script>
